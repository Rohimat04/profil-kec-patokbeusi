<div id="jam"></div>

<script>

function tampilJam() {

    var waktu = new Date();

    var jam = waktu.getHours();
    var menit = waktu.getMinutes();
    var detik = waktu.getSeconds();

    document.getElementById("jam").innerHTML =
    "<font color='yellow' size='6'>" +
    jam + ":" + menit + ":" + detik +
    "</font>";

}

setInterval(tampilJam, 1000);

</script>
